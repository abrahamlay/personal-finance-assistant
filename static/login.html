<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Asisten Keuangan</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f0fdf4;
            color: #1f2937;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 360px;
            padding: 24px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            text-align: center;
        }
        .icon {
            width: 64px;
            height: 64px;
            background: #d1fae5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 28px;
        }
        h1 {
            font-size: 22px;
            margin: 0 0 8px;
            color: #059669;
        }
        p {
            font-size: 14px;
            color: #4b5563;
            margin: 0 0 24px;
            line-height: 1.5;
        }
        .btn-google {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 14px 16px;
            font-size: 15px;
            font-weight: 600;
            color: #ffffff;
            background: #059669;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s ease;
        }
        .btn-google:hover { background: #047857; }
        .btn-google:disabled { background: #9ca3af; cursor: not-allowed; }
        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .fallback {
            display: none;
            margin-top: 20px;
            padding: 14px;
            background: #fef3c7;
            border-radius: 8px;
            font-size: 13px;
            color: #92400e;
            text-align: left;
        }
        .fallback code {
            display: block;
            margin-top: 8px;
            padding: 8px;
            background: #fffbeb;
            border: 1px dashed #f59e0b;
            border-radius: 6px;
            word-break: break-all;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #9ca3af;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">💰</div>
        <h1>Asisten Keuangan</h1>
        <p>Hubungkan akun Google Sheets Anda untuk menyimpan data keuangan secara aman.</p>
        <a id="loginBtn" class="btn-google" href="#" role="button">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            <span>Login dengan Google</span>
        </a>
        <div id="loading" style="display:none;margin-top:16px;font-size:13px;color:#059669">Membuka halaman Google...</div>
        <div id="fallback" class="fallback">
            Jika tombol tidak berfungsi, salin kode berikut dan kirim ke bot:
            <code id="fallbackCode"></code>
        </div>
        <div class="footer">Data Anda dienkripsi dan hanya bisa diakses oleh Anda.</div>
    </div>

    <script>
        (function() {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();

            const loginBtn = document.getElementById('loginBtn');
            const loading = document.getElementById('loading');
            const fallback = document.getElementById('fallback');
            const fallbackCode = document.getElementById('fallbackCode');

            // Persist Telegram WebApp init params in sessionStorage so they survive
            // the OAuth redirect chain (Google -> /oauth/callback).
            function saveTelegramInitParams() {
                try {
                    const initParams = {};
                    const search = new URLSearchParams(window.location.search);
                    search.forEach(function(value, key) {
                        if (key.indexOf('tgWebApp') === 0) initParams[key] = value;
                    });
                    const hash = window.location.hash.replace(/^#/, '');
                    if (hash) {
                        const hashParams = new URLSearchParams(hash.replace(/\?/g, '&'));
                        hashParams.forEach(function(value, key) {
                            if (key.indexOf('tgWebApp') === 0) initParams[key] = value;
                        });
                    }
                    if (Object.keys(initParams).length) {
                        window.sessionStorage.setItem('__tg_init_params__', JSON.stringify(initParams));
                    }
                } catch (e) {}
            }

            // Save init params on first load and before leaving for Google OAuth.
            saveTelegramInitParams();

            const authUrl = tg.initDataUnsafe && tg.initDataUnsafe.start_param
                ? '/oauth/authorize?start_param=' + encodeURIComponent(tg.initDataUnsafe.start_param)
                : '/oauth/authorize';

            loginBtn.addEventListener('click', function(e) {
                e.preventDefault();
                loading.style.display = 'block';
                loginBtn.style.display = 'none';

                fetch(authUrl)
                    .then(r => r.json())
                    .then(data => {
                        if (data.url) {
                            saveTelegramInitParams();
                            window.location.href = data.url;
                        } else {
                            throw new Error('Tidak ada URL OAuth');
                        }
                    })
                    .catch(err => {
                        loading.style.display = 'none';
                        loginBtn.style.display = 'inline-flex';
                        fallbackCode.textContent = 'Gagal: ' + err.message;
                        fallback.style.display = 'block';
                    });
            });

            // Jika berhasil kembali dari Google di jendela yang sama, kirim data ke bot.
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const state = params.get('state');
            if (code && state) {
                try {
                    tg.sendData(JSON.stringify({ code: code, state: state }));
                    setTimeout(() => tg.close(), 1500);
                } catch (e) {
                    fallbackCode.textContent = '/verify ' + code + ' ' + state;
                    fallback.style.display = 'block';
                }
            }
        })();
    </script>
</body>
</html>
